# Render blueprint for the HCD compliance QA cross-check job (Prompt 6).
#
# Deploy from the repo root (paths are repo-root relative). Runs weekly at
# 06:00 UTC Mondays - after the scraper (03:00) and extraction pipeline have
# refreshed adu_rules, so the cross-check reads current data.
#
# Copy this service block into a root-level render.yaml alongside the scraper
# and pipeline services, or deploy as its own blueprint.

services:
  - type: cron
    name: ca-adu-qa-crosscheck
    runtime: python
    plan: starter
    schedule: "0 6 * * 1"
    buildCommand: "pip install -r scraper/qa/requirements.txt"
    startCommand: "python -m scraper.qa.run"
    autoDeploy: false
    envVars:
      # Secrets - set in the Render dashboard; never commit them.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Alerting - at least one channel recommended.
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: QA_ALERT_EMAIL_TO
        sync: false
      # Optional: override the APR CSV resource URL if CKAN discovery fails.
      - key: HCD_APR_CSV_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.7"
