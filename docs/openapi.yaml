openapi: 3.1.0
info:
  title: CA ADU Zoning API
  version: "1.0.0"
  description: >
    Developer API mapping ADU (accessory dwelling unit) and housing-density
    zoning codes for 8 major California cities. Every numeric and boolean field
    is validated against California state-law floors and ceilings (AB 2221,
    SB 897, SB 9, Gov. Code sections 66310-66342) and tagged with a
    compliance_flag. Authenticate with an API key; requests are metered against
    a monthly per-tier quota (Free 50, Starter 1000, Pro 10000).
  contact:
    name: CA ADU Zoning API
    url: https://ca-adu-api.example.com
  license:
    name: Proprietary
servers:
  - url: https://api.ca-adu-api.example.com
    description: Production gateway (clean /v1 routes)
  - url: https://{projectRef}.supabase.co/functions/v1
    description: Direct Supabase Edge Function host
    variables:
      projectRef:
        default: your-project-ref
        description: Supabase project reference

tags:
  - name: cities
    description: City registry.
  - name: adu-rules
    description: State-law-validated ADU rules per city and zone.
  - name: compliance-flags
    description: Compliance-flag summaries.

security:
  - bearerAuth: []
  - apiKeyHeader: []

paths:
  /v1/cities:
    get:
      tags: [cities]
      operationId: listCities
      summary: List covered cities
      description: >
        Returns the cities covered by the API. Requires a valid API key and
        counts against the caller's monthly quota.
      responses:
        "200":
          description: List of cities.
          content:
            application/json:
              schema:
                type: object
                required: [data, count]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/City"
                  count:
                    type: integer
                    examples: [8]
                  tier:
                    $ref: "#/components/schemas/ApiTier"
                  limit:
                    type: integer
                    description: Monthly request limit for the caller's tier.
                    examples: [1000]
                  requests_this_month:
                    type: integer
                    examples: [12]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/QuotaExceeded"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/adu-rules:
    get:
      tags: [adu-rules]
      operationId: getAduRules
      summary: Get ADU rules
      description: >
        Returns ADU rule rows joined to their city. Filter by city slug and
        optionally by zone_district. Requires a valid API key and counts against
        the caller's monthly quota.
      parameters:
        - name: city
          in: query
          required: false
          description: City slug (e.g. los_angeles, san_diego, oakland).
          schema:
            type: string
          examples:
            losAngeles:
              value: los_angeles
        - name: zone
          in: query
          required: false
          description: >
            Zone district to filter by (case-insensitive), e.g. R-1, RS.
          schema:
            type: string
          examples:
            r1:
              value: R-1
      responses:
        "200":
          description: Matching ADU rule rows.
          content:
            application/json:
              schema:
                type: object
                required: [data, count]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AduRule"
                  count:
                    type: integer
                    examples: [3]
                  filters:
                    type: object
                    properties:
                      city:
                        type: [string, "null"]
                      zone:
                        type: [string, "null"]
                  tier:
                    $ref: "#/components/schemas/ApiTier"
                  limit:
                    type: integer
                    examples: [1000]
                  requests_this_month:
                    type: integer
                    examples: [13]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/QuotaExceeded"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/compliance-flags:
    get:
      tags: [compliance-flags]
      operationId: getComplianceFlags
      summary: Get compliance-flag summary
      description: >
        Returns one entry per (city, zone) with its compliance_flag and
        validation notes, plus an aggregate count of each flag value across the
        result set. Filter by city slug (optional). Requires a valid API key and
        counts against the caller's monthly quota.
      parameters:
        - name: city
          in: query
          required: false
          description: City slug (e.g. oakland).
          schema:
            type: string
          examples:
            oakland:
              value: oakland
      responses:
        "200":
          description: Compliance-flag entries and aggregate summary.
          content:
            application/json:
              schema:
                type: object
                required: [data, count, summary]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ComplianceFlagEntry"
                  count:
                    type: integer
                    examples: [12]
                  summary:
                    type: object
                    description: Count of rows per compliance_flag value.
                    properties:
                      compliant:
                        type: integer
                        examples: [7]
                      more_restrictive:
                        type: integer
                        examples: [3]
                      needs_review:
                        type: integer
                        examples: [2]
                    additionalProperties:
                      type: integer
                  filters:
                    type: object
                    properties:
                      city:
                        type: [string, "null"]
                  tier:
                    $ref: "#/components/schemas/ApiTier"
                  limit:
                    type: integer
                    examples: [1000]
                  requests_this_month:
                    type: integer
                    examples: [14]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/QuotaExceeded"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        Send the raw API key as a bearer token:
        `Authorization: Bearer <key>`. The key is sha256-hashed server-side and
        matched against api_keys.key_hash.
    apiKeyHeader:
      type: apiKey
      in: header
      name: x-api-key
      description: >
        Alternative to the bearer token. Send the raw API key in the x-api-key
        header.

  responses:
    Unauthorized:
      description: API key missing, invalid, or revoked.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            missing:
              value:
                error: unauthorized
                message: >-
                  Missing API key. Provide it via 'Authorization: Bearer <key>'
                  or the 'x-api-key' header.
            invalid:
              value:
                error: unauthorized
                message: Invalid or revoked API key.
    QuotaExceeded:
      description: Monthly request quota exceeded for the caller's tier.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/QuotaError"
          examples:
            free:
              value:
                error: quota_exceeded
                message: >-
                  Monthly request quota exceeded for your plan. Upgrade your
                  tier or wait for the next billing cycle.
                tier: free
                limit: 50
                requests_this_month: 50
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            failure:
              value:
                error: internal_error
                message: Failed to load ADU rules.

  schemas:
    ApiTier:
      type: string
      enum: [free, starter, pro, enterprise]
      description: >
        API plan tier. Monthly quotas: free 50, starter 1000, pro 10000,
        enterprise effectively unlimited.

    ComplianceFlag:
      type: string
      enum: [compliant, more_restrictive, needs_review]
      description: >
        Result of validating the row against state-law baselines.
        'compliant' matches state floors/ceilings; 'more_restrictive' is stricter
        than the state minimum; 'needs_review' could not be automatically
        confirmed.

    PublisherType:
      type: string
      enum: [alp, municode]
      description: >
        Municipal-code publisher: American Legal Publishing (alp) or Municode.

    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          examples: [unauthorized]
        message:
          type: string
          examples: [Invalid or revoked API key.]

    QuotaError:
      type: object
      required: [error, message, tier, limit, requests_this_month]
      properties:
        error:
          type: string
          examples: [quota_exceeded]
        message:
          type: string
        tier:
          $ref: "#/components/schemas/ApiTier"
        limit:
          type: integer
          description: Monthly request limit for the caller's tier.
          examples: [50]
        requests_this_month:
          type: integer
          examples: [50]

    City:
      type: object
      required: [id, name, slug, publisher_type, base_url]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          examples: [Los Angeles]
        slug:
          type: string
          examples: [los_angeles]
        publisher_type:
          $ref: "#/components/schemas/PublisherType"
        base_url:
          type: string
          format: uri
        last_scraped_at:
          type: [string, "null"]
          format: date-time
        created_at:
          type: string
          format: date-time

    CityRef:
      type: object
      description: City reference embedded in an ADU rule row.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          examples: [Los Angeles]
        slug:
          type: string
          examples: [los_angeles]
        publisher_type:
          $ref: "#/components/schemas/PublisherType"
        base_url:
          type: string
          format: uri
        last_scraped_at:
          type: [string, "null"]
          format: date-time

    AduRule:
      type: object
      description: >
        A structured, state-law-validated ADU rule set for a single city and
        zone district. Numeric fields are in feet, square feet, or days as noted.
        Baselines reference AB 2221, SB 897, SB 9, and Gov. Code 66310-66342.
      required: [id, zone_district, compliance_flag]
      properties:
        id:
          type: string
          format: uuid
        zone_district:
          type: string
          description: Zoning district, e.g. R-1, RS.
          examples: [R-1]
        max_height_detached_standard_ft:
          type: [number, "null"]
          description: Max height for a standard detached ADU (ft). State floor 16 (AB 2221).
        max_height_near_transit_ft:
          type: [number, "null"]
          description: Max height near transit (ft). State floor 18 (AB 2221/SB 897).
        max_height_multifamily_lot_ft:
          type: [number, "null"]
          description: Max height on a multifamily lot (ft). State floor 18 (AB 2221).
        max_height_attached_ft:
          type: [number, "null"]
          description: Max height for an attached ADU (ft). State ceiling 25 or zone limit (AB 2221).
        side_rear_setback_min_ft:
          type: [number, "null"]
          description: Minimum side/rear setback (ft). State ceiling 4 (AB 2221).
        front_setback_restriction:
          type: [boolean, "null"]
          description: Whether a front-setback restriction blocks the ADU. Must be false (AB 2221).
        owner_occupancy_required_adu:
          type: [boolean, "null"]
          description: Owner-occupancy required for an ADU. Must be false (Gov 66315/66323).
        owner_occupancy_required_jadu:
          type: [boolean, "null"]
          description: Owner-occupancy required for a JADU. Conditional on shared sanitation (Gov 66333(b)).
        jadu_allowed:
          type: [boolean, "null"]
          description: Junior ADU allowed. Must be true (Gov 66333).
        jadu_separate_sale_allowed:
          type: [boolean, "null"]
          description: JADU may be sold separately. Must be false (Gov 66333(c)(1)).
        adu_condo_sale_allowed:
          type: [boolean, "null"]
          description: ADU may be sold as a condo (AB 1033 local opt-in).
        parking_required:
          type: [boolean, "null"]
          description: Parking required. False near transit/historic per SB 897.
        demolition_permit_concurrent:
          type: [boolean, "null"]
          description: Demolition permit issued concurrently. Must be true (SB 897).
        permit_review_days:
          type: [number, "null"]
          description: Ministerial permit review time (days). Must be <= 60 (SB 897/AB 2221).
        fire_sprinkler_trigger:
          type: [boolean, "null"]
          description: ADU triggers a fire-sprinkler requirement. Must be false (SB 897).
        impact_fee_exempt_sqft_threshold:
          type: [number, "null"]
          description: ADU size (sqft) exempt from impact fees. 750 (AB 68/SB 13).
        max_size_sqft_1br:
          type: [number, "null"]
          description: Max size for a 1-bedroom ADU (sqft). >= 850.
        max_size_sqft_2br:
          type: [number, "null"]
          description: Max size for a 2+ bedroom ADU (sqft). >= 1000.
        max_size_sqft_general_cap:
          type: [number, "null"]
          description: General ADU size cap (sqft). Up to 1200.
        nonconforming_zoning_denial_allowed:
          type: [boolean, "null"]
          description: Denial allowed due to nonconforming zoning. Must be false (SB 897).
        pre_2018_unpermitted_adu_amnesty:
          type: [boolean, "null"]
          description: Amnesty for pre-2018 unpermitted ADUs. Must be true (SB 897).
        sb9_duplex_ministerial:
          type: [boolean, "null"]
          description: Ministerial duplex approval under SB 9.
        sb9_lot_split_min_lot_sqft:
          type: [number, "null"]
          description: Minimum lot size for an SB 9 lot split (sqft). 1200.
        sb9_lot_split_ratio:
          type: [number, "null"]
          description: Max SB 9 lot-split ratio. 0.4 (60/40 max).
        sb9_one_split_per_owner:
          type: [boolean, "null"]
          description: One SB 9 lot split per owner. True.
        source_section_id:
          type: [string, "null"]
          format: uuid
          description: FK to the zoning_sections row this rule was extracted from.
        compliance_flag:
          $ref: "#/components/schemas/ComplianceFlag"
        compliance_notes:
          type: [object, "null"]
          description: Per-field validation detail (JSON).
          additionalProperties: true
        last_validated_at:
          type: [string, "null"]
          format: date-time
        created_at:
          type: string
          format: date-time
        city:
          $ref: "#/components/schemas/CityRef"

    ComplianceFlagEntry:
      type: object
      required: [zone_district, compliance_flag]
      properties:
        city:
          type: [string, "null"]
          examples: [Oakland]
        city_slug:
          type: [string, "null"]
          examples: [oakland]
        zone_district:
          type: string
          examples: [R-1]
        compliance_flag:
          $ref: "#/components/schemas/ComplianceFlag"
        compliance_notes:
          type: [object, "null"]
          additionalProperties: true
        last_validated_at:
          type: [string, "null"]
          format: date-time
