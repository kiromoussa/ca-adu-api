# ADU Atlas API - jurisdiction registry seed data.
#
# Seeds the jurisdictions table. Coverage honesty is a non-negotiable: a city is
# only `production` after its source registry, GIS layers, and rule set are
# ingested, tested, and verified. Los Angeles City is the v1 target and is
# currently `ingesting`; every other city is `planned` until its data lands.
#
# coverage_status values:
#   planned    - registered but no data ingested; feasibility returns
#                unsupported_coverage (not billed)
#   ingesting  - data ingestion in progress; not yet production-verified
#   production - sources + GIS + rules ingested, tested, verified; billable
#
# publisher_type values: american_legal | municode
#
# project_type values: detached_adu | attached_adu | garage_conversion |
#   jadu | sb9_duplex | sb9_urban_lot_split

version: 1

# Full v1 project type enum (shared across all jurisdictions).
project_types:
  - detached_adu
  - attached_adu
  - garage_conversion
  - jadu
  - sb9_duplex
  - sb9_urban_lot_split

jurisdictions:
  - slug: los_angeles
    name: Los Angeles
    display_name: City of Los Angeles
    state: CA
    county: Los Angeles
    publisher_type: american_legal
    official_code_url: https://codelibrary.amlegal.com/codes/los_angeles/latest/lamc/0-0-0-422835
    coverage_status: ingesting
    source_keys:
      - lamc_amlegal
      - la_zimas_parcels
      - la_zimas_zoning
      - fema_nfhl
      - calfire_fhsz
      - ca_state_adu_law
    supported_project_types:
      - detached_adu
      - attached_adu
      - garage_conversion
      - jadu
      - sb9_duplex
      - sb9_urban_lot_split
    notes: >-
      v1 target jurisdiction. Uses LA City ZIMAS for parcels and zoning. Do not
      substitute unincorporated LA County zoning. Envelope calculations enabled
      for LA only.

