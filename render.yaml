# ADU Atlas API - Render blueprint.
#
# Replaces the prior scraper-product blueprint (web service + 3 cron workers
# for the old CA ADU Zoning API scraper/pipeline/qa). This version deploys the
# ADU Atlas pivot: a Docker-based FastAPI request-path service plus three
# Docker-based cron workers for GIS ingestion, municipal-code ingestion, and
# HCD compliance QA, per docs/adr/0001-architecture.md and docs/PRODUCT_SPEC.md.
#
# One-time setup (dashboard-gated - Render must install its GitHub App on the
# repo): Render Dashboard -> New -> Blueprint -> connect
# github.com/kiromoussa/ca-adu-api -> Render detects this file and provisions
# the services below. Then set every `sync: false` secret once in the
# dashboard. See .env.example for the full variable set and docs/DEPLOY.md for
# the ordered rollout.
#
# Both Dockerfiles build with the repo root as context (dockerContext: .) so
# they can pull in the sibling services/core, config/, and openapi/ subtrees -
# see docker/Dockerfile.api and docker/Dockerfile.ingestion for the exact
# COPY list and the assumed module entrypoints.
#
# Cron schedules are staggered (UTC, Monday): GIS ingestion 03:00 -> code
# ingestion 04:30 -> QA cross-check 06:00, so each stage reads data the
# previous stage has already refreshed. autoDeploy is false on the cron
# workers so a new ingestion image is only rolled out intentionally.

services:
  # 1. FastAPI request-path service: deterministic rule engine + PostGIS
  #    spatial feasibility. No LLM on this path (see docs/PRODUCT_SPEC.md).
  - type: web
    name: adu-atlas-api
    runtime: docker
    dockerfilePath: docker/Dockerfile.api
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /v1/health
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: RAPIDAPI_PROXY_SECRET
        sync: false
      - key: GEOCODER_PROVIDER
        value: census
      - key: GOOGLE_MAPS_GEOCODING_API_KEY
        sync: false
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
      - key: WEB_CONCURRENCY
        value: "2"

  # 2. GIS ingestion: LA City ZIMAS parcels + zoning districts, FEMA NFHL
  #    flood, CAL FIRE FHSZ. Writes parcels, zoning_districts,
  #    overlay_features, source_registry, ingest_runs. LA City is the v1
  #    target and is hardcoded as the jurisdiction inside
  #    ingestion/gis/la_zimas.py, so `all` (not a --jurisdiction flag, which
  #    this entrypoint does not take) is the correct source selector; the
  #    statewide zoning bootstrap is opt-in (`--slug <other-city>`) and is not
  #    needed for LA, which has its own authoritative zoning layer.
  - type: cron
    name: adu-atlas-ingest-gis
    runtime: docker
    dockerfilePath: docker/Dockerfile.ingestion
    dockerContext: .
    dockerCommand: "python -m ingestion.gis.run all"
    schedule: "0 3 * * 1"
    plan: starter
    region: oregon
    autoDeploy: false
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # 3. Municipal-code ingestion: LAMC sections into zoning_sections +
  #    immutable source_snapshots, then offline LLM extraction candidates into
  #    zoning_rules / rule_attributes (review_status pending human/source
  #    validation - never auto-verified). LLM is offline-only, never on the
  #    API request path.
  #    ingestion/code/run.py and its sibling modules use flat, non-package
  #    imports by design (see ingestion/code/README.md), so it must run with
  #    ingestion/code/ as the working directory rather than as
  #    `python -m ingestion.code.run`. Runs the `ingest` then `extract` stages;
  #    `validate` (the QA cross-check) is scheduled separately below.
  - type: cron
    name: adu-atlas-ingest-code
    runtime: docker
    dockerfilePath: docker/Dockerfile.ingestion
    dockerContext: .
    dockerCommand: >-
      sh -c "cd ingestion/code && python run.py ingest --jurisdiction los_angeles
      && python run.py extract --jurisdiction los_angeles"
    schedule: "30 4 * * 1"
    plan: starter
    region: oregon
    autoDeploy: false
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Provide exactly one LLM provider for offline extraction.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        sync: false

  # 4. Compliance QA cross-check: state_rule_baselines vs. extracted
  #    zoning_rules, writes qa_issues. Runs last so it reads the current run's
  #    ingestion output. This is the `validate` stage of ingestion/code/run.py
  #    (there is no separate `ingestion.code.qa` module); like the ingest-code
  #    cron above, it must run with ingestion/code/ as the working directory.
  #    HCD Housing Element APR cross-reference and Slack alerting
  #    (SLACK_WEBHOOK_URL, HCD_APR_DATASET_URL below) are provisioned here for
  #    the ingestion/code subtree to wire up; they are not required for the
  #    `validate` stage itself to run.
  - type: cron
    name: adu-atlas-qa-crosscheck
    runtime: docker
    dockerfilePath: docker/Dockerfile.ingestion
    dockerContext: .
    dockerCommand: 'sh -c "cd ingestion/code && python run.py validate --jurisdiction los_angeles"'
    schedule: "0 6 * * 1"
    plan: starter
    region: oregon
    autoDeploy: false
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: HCD_APR_DATASET_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
