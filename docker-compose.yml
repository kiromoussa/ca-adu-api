# ADU Atlas API - local development stack.
#
# Brings up a local Postgres 15 + PostGIS 3.4 database (matching the live
# Supabase project's PostGIS 3.3+ baseline, see supabase/migrations/0004), the
# FastAPI request-path service, and an optional Adminer UI for inspecting
# tables/geometry during development.
#
# Usage:
#   cp .env.example .env               # fill in Supabase / LLM / geocoder vars
#   make db-up                         # or: docker compose up -d db
#   make migrate                       # applies supabase/migrations/*.sql
#   docker compose up --build api      # or: make api-dev to run uvicorn --reload on the host
#   docker compose --profile tools up -d adminer   # optional DB inspector
#
# This local `db` service is independent of `supabase start` (the Supabase CLI
# local stack, which uses ports 54321-54323). It runs on 54329 to avoid
# clashing with the Supabase CLI stack if both happen to be running.

services:
  db:
    image: postgis/postgis:15-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${LOCAL_DB_PORT:-54329}:5432"
    volumes:
      - adu_atlas_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-postgresql://postgres:postgres@db:5432/postgres}
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # Lightweight Postgres/PostGIS inspector for local development. Not started
  # by default; run `docker compose --profile tools up -d adminer`.
  adminer:
    image: adminer:4.8.1
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "8081:8080"
    depends_on:
      - db
    profiles:
      - tools

volumes:
  adu_atlas_db_data:
