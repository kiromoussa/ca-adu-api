openapi: 3.0.3
info:
  title: CA ADU Zoning API
  version: "1.0.0"
  description: >
    Developer API mapping accessory dwelling unit (ADU) and housing-density
    zoning codes for 8 major California cities into structured, state-law-validated
    fields. Every numeric and boolean field is validated against California state
    baselines (AB 2221, SB 897, SB 9, Gov. Code 66310-66342).
  contact:
    name: CA ADU Zoning API
    email: support@ca-adu-api.dev
servers:
  - url: https://YOUR_PROJECT.supabase.co/functions/v1
    description: Supabase Edge Functions (production)
security:
  - ApiKeyAuth: []
tags:
  - name: rules
    description: ADU zoning rules
  - name: cities
    description: Covered cities
  - name: compliance
    description: State-law compliance flags
paths:
  /v1/adu-rules:
    get:
      tags: [rules]
      summary: Get ADU rules for a city and zone district
      description: >
        Returns the structured, state-law-validated ADU rule set. Filter by city
        slug and optionally by zone district. Each call is counted against your
        monthly quota and logged.
      operationId: getAduRules
      parameters:
        - name: city
          in: query
          required: true
          description: City slug (e.g. los_angeles, san_diego, oakland).
          schema:
            type: string
            example: los_angeles
        - name: zone
          in: query
          required: false
          description: Zone district (e.g. R1, RS). If omitted, all zones for the city are returned.
          schema:
            type: string
            example: R1
      responses:
        "200":
          description: Matching ADU rule rows.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AduRule"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/QuotaExceeded"
  /v1/cities:
    get:
      tags: [cities]
      summary: List covered cities
      description: Returns the 8 covered California cities, their code publisher, and last-scraped timestamp.
      operationId: getCities
      responses:
        "200":
          description: Covered cities.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/City"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/QuotaExceeded"
  /v1/compliance-flags:
    get:
      tags: [compliance]
      summary: Get per-field compliance flags
      description: >
        Returns the compliance flag (compliant, more_restrictive, needs_review)
        for each rule row, with per-field validation detail comparing the local
        ordinance against the state-law baseline.
      operationId: getComplianceFlags
      parameters:
        - name: city
          in: query
          required: false
          description: City slug to filter by.
          schema:
            type: string
            example: oakland
        - name: flag
          in: query
          required: false
          description: Filter to a single compliance flag value.
          schema:
            $ref: "#/components/schemas/ComplianceFlag"
      responses:
        "200":
          description: Compliance flags.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ComplianceRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/QuotaExceeded"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Your API key. Pass the raw key (adu_live_...) in the x-api-key header.
  responses:
    Unauthorized:
      description: Missing, invalid, or revoked API key.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    QuotaExceeded:
      description: Monthly request quota for your tier has been exceeded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    ComplianceFlag:
      type: string
      enum: [compliant, more_restrictive, needs_review]
    City:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Los Angeles
        slug:
          type: string
          example: los_angeles
        publisher_type:
          type: string
          enum: [alp, municode]
        base_url:
          type: string
          format: uri
        last_scraped_at:
          type: string
          format: date-time
          nullable: true
    AduRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        city_id:
          type: string
          format: uuid
        zone_district:
          type: string
          example: R1
        max_height_detached_standard_ft:
          type: number
          nullable: true
          description: State floor 16 ft (AB 2221).
        max_height_near_transit_ft:
          type: number
          nullable: true
          description: State floor 18 ft (AB 2221/SB 897).
        max_height_multifamily_lot_ft:
          type: number
          nullable: true
          description: State floor 18 ft (AB 2221).
        max_height_attached_ft:
          type: number
          nullable: true
          description: State ceiling 25 ft or zone limit (AB 2221).
        side_rear_setback_min_ft:
          type: number
          nullable: true
          description: State ceiling 4 ft (AB 2221).
        front_setback_restriction:
          type: boolean
          nullable: true
          description: Must be false per AB 2221.
        owner_occupancy_required_adu:
          type: boolean
          nullable: true
          description: Must be false (Gov. Code 66315/66323).
        owner_occupancy_required_jadu:
          type: boolean
          nullable: true
          description: Conditional on shared sanitation (Gov. Code 66333(b)).
        jadu_allowed:
          type: boolean
          nullable: true
          description: Must be true (Gov. Code 66333).
        jadu_separate_sale_allowed:
          type: boolean
          nullable: true
          description: Must be false (Gov. Code 66333(c)(1)).
        adu_condo_sale_allowed:
          type: boolean
          nullable: true
          description: AB 1033 opt-in.
        parking_required:
          type: boolean
          nullable: true
          description: False near transit/historic (SB 897).
        demolition_permit_concurrent:
          type: boolean
          nullable: true
          description: Must be true (SB 897).
        permit_review_days:
          type: number
          nullable: true
          description: Must be <= 60 (SB 897/AB 2221).
        fire_sprinkler_trigger:
          type: boolean
          nullable: true
          description: Must be false (SB 897).
        impact_fee_exempt_sqft_threshold:
          type: number
          nullable: true
          description: 750 sqft exemption (AB 68/SB 13).
        max_size_sqft_1br:
          type: number
          nullable: true
        max_size_sqft_2br:
          type: number
          nullable: true
        max_size_sqft_general_cap:
          type: number
          nullable: true
        nonconforming_zoning_denial_allowed:
          type: boolean
          nullable: true
          description: Must be false (SB 897).
        pre_2018_unpermitted_adu_amnesty:
          type: boolean
          nullable: true
          description: Must be true (SB 897).
        sb9_duplex_ministerial:
          type: boolean
          nullable: true
        sb9_lot_split_min_lot_sqft:
          type: number
          nullable: true
          description: 1200 sqft (SB 9).
        sb9_lot_split_ratio:
          type: number
          nullable: true
          description: 0.4 max (SB 9).
        sb9_one_split_per_owner:
          type: boolean
          nullable: true
        compliance_flag:
          $ref: "#/components/schemas/ComplianceFlag"
        last_validated_at:
          type: string
          format: date-time
          nullable: true
    ComplianceRecord:
      type: object
      properties:
        city_id:
          type: string
          format: uuid
        zone_district:
          type: string
          example: R1
        compliance_flag:
          $ref: "#/components/schemas/ComplianceFlag"
        compliance_notes:
          type: object
          nullable: true
          description: Per-field validation detail comparing local value to the state baseline.
          additionalProperties: true
    Error:
      type: object
      properties:
        error:
          type: string
          example: quota_exceeded
        message:
          type: string
          example: Monthly request quota exceeded for tier 'free'.
