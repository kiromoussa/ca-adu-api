# ADU Atlas API - isolated PostGIS for the integration test suite.
#
# This is a throwaway, ephemeral database kept separate from the local
# development stack in the repo-root docker-compose.yml:
#   - it listens on 54330 (dev db is 54329) so both can run side by side, and
#   - its data lives on tmpfs, so every `docker compose ... down` (or restart)
#     wipes it clean. The integration suite also resets the public schema on
#     each run, so re-running pytest against a long-lived container is safe too.
#
# Usage:
#   docker compose -f tests/integration/docker-compose.yml up -d
#   ADU_TEST_DB_URL=postgresql://postgres:postgres@localhost:54330/postgres \
#     pytest tests/integration -v
#   docker compose -f tests/integration/docker-compose.yml down
#
# The suite skips itself cleanly when this database is not reachable, so CI jobs
# that do not stand it up are unaffected.

services:
  test-db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "54330:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 3s
      timeout: 5s
      retries: 30
