# ADU Atlas API - source registry seed data.
#
# Seeds the source_registry table. Every source that can back a substantive
# result field is registered here with its publisher, endpoints, type, an
# authority_rank, and license/terms notes. Provenance on every API result field
# references a source_registry row by `key`.
#
# authority_rank convention (lower number = higher legal authority for a given
# determination). Local adopted ordinances and official parcel/zoning GIS win
# over statewide bootstrap layers; HCD is guidance/interpretive, not binding on
# its own. Local rules more restrictive than the state baseline are flagged, not
# discarded (see state_rule_baselines / compliance_flag).
#
#   1  state statute baseline (California Gov Code, AB/SB acts)   [state_law]
#   2  local adopted municipal code / zoning ordinance            [municipal_code]
#   2  official jurisdiction parcel + zoning GIS                  [gis_parcel/gis_zoning]
#   3  official hazard/overlay GIS (FEMA, CAL FIRE, local overlay) [gis_overlay]
#   4  state agency guidance (HCD handbook, review letters)       [state_guidance]
#   5  statewide bootstrap zoning (used only until local ingested) [gis_zoning_bootstrap]
#
# source_type values:
#   municipal_code | gis_parcel | gis_zoning | gis_overlay |
#   gis_zoning_bootstrap | state_law | state_guidance
#
# publisher values: american_legal | municode | city_gis | fema | cal_fire |
#   hcd | ca_open_data
#
# retrieval values: alp_render_api | municode_playwright | arcgis_rest |
#   document | manual

version: 1

sources:
  # -------------------------------------------------------------------------
  # State-law baseline (authoritative floor/ceiling for every determination)
  # -------------------------------------------------------------------------
  - key: ca_state_adu_law
    name: California ADU / JADU / SB 9 statute baseline
    publisher: hcd
    source_type: state_law
    authority_rank: 1
    base_url: https://leginfo.legislature.ca.gov/faces/codes_displayText.xhtml?lawCode=GOV&division=1.&title=7.&part=&chapter=13.&article=2.
    rest_service_url: null
    retrieval: document
    citations:
      - AB 68
      - AB 881
      - AB 2221
      - SB 13
      - SB 897
      - SB 9
      - "Gov. Code 66310-66342"
      - "Gov. Code 65852.21 (SB 9 duplex)"
      - "Gov. Code 66411.7 (SB 9 lot split)"
    license_or_terms_notes: >-
      California statute; public domain. Text via official California
      Legislative Information (leginfo). Seeds state_rule_baselines.

  # -------------------------------------------------------------------------
  # State agency guidance (interpretive, not binding on its own)
  # -------------------------------------------------------------------------
  - key: hcd_adu_handbook
    name: HCD Accessory Dwelling Unit Handbook
    publisher: hcd
    source_type: state_guidance
    authority_rank: 4
    base_url: https://www.hcd.ca.gov/building-standards/adu/handbook
    rest_service_url: null
    retrieval: document
    license_or_terms_notes: >-
      California Department of Housing and Community Development guidance
      document. Interpretive only. Used for QA cross-checks and assumptions,
      never as the sole authority for a determination.

  - key: hcd_adu_landing
    name: HCD Accessory Dwelling Unit program page
    publisher: hcd
    source_type: state_guidance
    authority_rank: 4
    base_url: https://www.hcd.ca.gov/building-standards/adu
    rest_service_url: null
    retrieval: document
    license_or_terms_notes: >-
      HCD ADU program landing page, including links to ordinance review letters.
      Interpretive/guidance; supports QA and freshness monitoring.

  # -------------------------------------------------------------------------
  # Municipal code publishers (local adopted ordinances)
  # -------------------------------------------------------------------------
  - key: lamc_amlegal
    name: Los Angeles Municipal Code (LAMC) - American Legal
    publisher: american_legal
    source_type: municipal_code
    authority_rank: 2
    jurisdiction_slug: los_angeles
    base_url: https://codelibrary.amlegal.com/codes/los_angeles/latest/lamc/0-0-0-422835
    rest_service_url: https://codelibrary.amlegal.com/api/render-doc/los_angeles/latest/lamc/
    retrieval: alp_render_api
    license_or_terms_notes: >-
      American Legal Publishing hosts the official LAMC. Retrieve via the
      render-doc API using curl_cffi (impersonate chrome) to bypass Cloudflare.
      Republication is display of public law; preserve immutable snapshots.

  - key: sandiego_amlegal
    name: San Diego Municipal Code - American Legal
    publisher: american_legal
    source_type: municipal_code
    authority_rank: 2
    jurisdiction_slug: san_diego
    base_url: https://docs.sandiego.gov/municode/MuniCodeChapter14/Ch14Art03Division01.pdf
    rest_service_url: https://library.amlegal.com/api/render-doc/san_diego/latest/sandiego/
    retrieval: alp_render_api
    license_or_terms_notes: >-
      San Diego code via American Legal plus official docs.sandiego.gov PDFs.
      Public law. Coverage planned; not yet ingested.

  - key: sanjose_municode
