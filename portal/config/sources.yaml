    authority_rank: 2
    jurisdiction_slug: san_francisco
    base_url: https://codelibrary.amlegal.com/codes/san_francisco/latest/sf_planning/
    rest_service_url: https://codelibrary.amlegal.com/api/render-doc/san_francisco/latest/sf_planning/
