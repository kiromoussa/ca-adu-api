  # -------------------------------------------------------------------------
  # Official jurisdiction GIS - parcels + zoning (LA City v1)
  # -------------------------------------------------------------------------
  - key: la_zimas_parcels
    name: LA City ZIMAS parcels (ArcGIS REST)
    publisher: city_gis
    source_type: gis_parcel
    authority_rank: 2
    jurisdiction_slug: los_angeles
    base_url: https://zimas.lacity.org/
    rest_service_url: https://zimas.lacity.org/arcgis/rest/services/zma/zimas/MapServer
    retrieval: arcgis_rest
    license_or_terms_notes: >-
      LA City Zone Information and Map Access System (ZIMAS). Official LA City
      parcel and zoning service. Do NOT substitute unincorporated LA County
      zoning for LA City. Query with ?f=pjson metadata, /query f=geojson,
      persist ETag/Last-Modified and layer metadata.

  - key: la_zimas_zoning
    name: LA City ZIMAS zoning districts (ArcGIS REST)
    publisher: city_gis
    source_type: gis_zoning
    authority_rank: 2
    jurisdiction_slug: los_angeles
    base_url: https://zimas.lacity.org/
    rest_service_url: https://zimas.lacity.org/arcgis/rest/services/zma/zimas/MapServer
    retrieval: arcgis_rest
    license_or_terms_notes: >-
      LA City zoning districts from ZIMAS MapServer. Spatial join parcel/centroid
      to zoning district; capture cross-zone ambiguity. Official LA City source.

  # -------------------------------------------------------------------------
  # Hazard / overlay GIS (statewide and federal)
  # -------------------------------------------------------------------------
  - key: fema_nfhl
    name: FEMA National Flood Hazard Layer (NFHL)
    publisher: fema
    source_type: gis_overlay
    overlay_type: flood
    authority_rank: 3
    base_url: https://www.fema.gov/flood-maps/national-flood-hazard-layer
    rest_service_url: https://hazards.fema.gov/arcgis/rest/services/public/NFHL/MapServer
    retrieval: arcgis_rest
    overlay_layer_hint:
      flood_hazard_zones_layer_id: 28
    license_or_terms_notes: >-
      FEMA NFHL public ArcGIS REST service, updated monthly. US Government work,
      public domain. Flood Hazard Zones are layer id 28. Preserve raw zone
      values (SFHA, ZONE) and distinguish "no hit" from "source unavailable".

  - key: calfire_fhsz
    name: CAL FIRE / OSFM Fire Hazard Severity Zones (FHSZ)
    publisher: cal_fire
    source_type: gis_overlay
    overlay_type: fire
    authority_rank: 3
    base_url: https://data.ca.gov/dataset/fire-hazard-severity-zone-viewer1
    rest_service_url: https://services.gis.ca.gov/arcgis/rest/services/Environment/Fire_Severity_Zones/MapServer
    retrieval: arcgis_rest
    license_or_terms_notes: >-
      CAL FIRE / Office of the State Fire Marshal Fire Hazard Severity Zones,
      hosted on the California state GIS service. Preserve raw hazard class
      (Moderate/High/Very High) and SRA/LRA responsibility area. California open
      data.

  # -------------------------------------------------------------------------
  # Statewide zoning bootstrap (used only until local zoning is ingested)
  # -------------------------------------------------------------------------
  - key: ca_statewide_zoning
    name: California statewide zoning (bootstrap only)
    publisher: ca_open_data
    source_type: gis_zoning_bootstrap
    authority_rank: 5
    base_url: https://lab.data.ca.gov/dataset/california-statewide-zoning-north
    rest_service_url: null
    retrieval: arcgis_rest
    license_or_terms_notes: >-
      California statewide zoning dataset (data.ca.gov lab). Bootstrap only:
      local jurisdiction zoning always wins where ingested. Never used as the
      authoritative zoning source for a production jurisdiction. California open
      data.
